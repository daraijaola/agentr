# AGENTR Fine-Tune Config — Qwen2.5-Coder-3B with Unsloth
#
# Run on your GPU server (RunPod A100 / Vast.ai):
#   pip install unsloth
#   python scripts/finetune.py
#
# Recommended GPU: A100 40GB (fits 3B model comfortably with QLoRA)
# Estimated time:  2-4 hours for ~1000 examples, 3 epochs
# Estimated cost:  ~$8-15 on RunPod at $2/hr

model:
  base: "Qwen/Qwen2.5-Coder-3B-Instruct"   # base model from HuggingFace
  # Alternatives if you want larger/smaller:
  # "Qwen/Qwen2.5-Coder-1.5B-Instruct"     # faster, less capable
  # "Qwen/Qwen2.5-Coder-7B-Instruct"       # better quality, needs A100 80GB

lora:
  r: 16                    # LoRA rank — higher = more capacity, more VRAM
  alpha: 32                # LoRA alpha (usually 2x rank)
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  dataset: "agentr-dataset.jsonl"    # your generated dataset
  output_dir: "agentr-model"
  epochs: 3
  batch_size: 4
  gradient_accumulation: 4           # effective batch = 16
  learning_rate: 2e-4
  warmup_steps: 20
  max_seq_length: 4096
  save_steps: 100
  logging_steps: 10
  fp16: true                         # use bf16 on A100

export:
  format: "gguf"                     # for llama.cpp deployment
  quantization: "q4_k_m"            # good balance of quality/size
  output: "agentr-model-q4.gguf"
