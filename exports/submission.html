<!DOCTYPE html>
  <html>
  <head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      background: #080808;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }
    .glow-blue   { width:500px; height:500px; background:#0098ea; opacity:0.16; top:-80px; left:160px; }
    .glow-purple { width:400px; height:400px; background:#7b61ff; opacity:0.14; bottom:-80px; left:280px; }
    .glow-right  { width:400px; height:400px; background:#0098ea; opacity:0.07; top:60px; right:80px; }

    .left {
      flex: 0 0 680px;
      padding: 0 60px 0 72px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #777;
    }
    .eyebrow-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #0098ea;
      flex-shrink: 0;
    }

    .headline {
      font-size: 60px;
      font-weight: 900;
      line-height: 1.06;
      color: #fff;
      letter-spacing: -0.03em;
    }
    .accent-ton {
      background: linear-gradient(135deg,#0098ea 0%,#0bc4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .accent-tg {
      background: linear-gradient(135deg,#2aabee 0%,#229ed9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      padding: 7px 14px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: 0.01em;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .footer-logo {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .footer-logo span { color: #0098ea; }
    .footer-sep { width:1px; height:14px; background:#333; }
    .footer-url { font-size: 13px; color: #555; }

    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding-right: 52px;
    }

    .phone {
      width: 248px;
      height: 510px;
      background: #1c1c1e;
      border-radius: 44px;
      border: 1.5px solid rgba(255,255,255,0.13);
      box-shadow:
        0 0 0 5px rgba(255,255,255,0.035),
        0 32px 64px rgba(0,0,0,0.85),
        0 60px 100px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      transform: perspective(1000px) rotateY(-7deg) rotateX(1.5deg);
    }

    .phone-screen {
      position: absolute;
      inset: 0;
      border-radius: 43px;
      overflow: hidden;
      background: #f5f0e8;
    }
    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .phone-notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 78px;
      height: 24px;
      background: #1c1c1e;
      border-radius: 18px;
      z-index: 10;
    }

    .phone-btn { position: absolute; background: rgba(255,255,255,0.09); border-radius: 3px; }
    .btn-r   { right:-3.5px; top:120px; width:3.5px; height:52px; }
    .btn-l1  { left:-3.5px; top:100px; width:3.5px; height:34px; }
    .btn-l2  { left:-3.5px; top:148px; width:3.5px; height:34px; }
    .btn-l3  { left:-3.5px; top:196px; width:3.5px; height:60px; }

    .phone-reflection {
      position: absolute;
      inset: 0;
      border-radius: 43px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%);
      pointer-events: none;
      z-index: 20;
    }
  </style>
  </head>
  <body>

  <div class="bg-glow glow-blue"></div>
  <div class="bg-glow glow-purple"></div>
  <div class="bg-glow glow-right"></div>

  <div class="left">
    <div class="eyebrow">
      <div class="eyebrow-dot"></div>
      Autonomous AI Agent &nbsp;·&nbsp; Telegram + TON
    </div>

    <div class="headline">
      First AI Agent<br>
      acting as a real<br>
      <span class="accent-ton">TON</span> &amp; <span class="accent-tg">Telegram</span><br>
      account.
    </div>

    <div class="badges">
      <span class="badge">GramJS User Accounts</span>
      <span class="badge">136 AI Tools</span>
      <span class="badge">TON Wallet Built-in</span>
      <span class="badge">Multi-Agent Swarm</span>
      <span class="badge">OpenAI-Compatible API</span>
      <span class="badge">Builds &amp; Deploys Code</span>
    </div>

    <div class="footer">
      <div class="footer-logo">AGENT<span>R</span></div>
      <div class="footer-sep"></div>
      <div class="footer-url">agentr.online</div>
    </div>
  </div>
